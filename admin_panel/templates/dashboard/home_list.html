{% extends "dashboard/base.html" %}
{% block title %}Edit Home{% endblock %}

{% block content %}
<h1>Edit Home Section</h1>

<div class="cards-container">
    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_name">Name:</label>
                {{ form.name }}
            </div>

            <div class="form-group">
                <label for="id_tagline">Tagline:</label>
                {{ form.tagline }}
            </div>

            <div class="form-group">
                <label for="id_profile_image">Profile Image:</label>
                {{ form.profile_image }}
                {% if home.profile_image %}
                    <img src="{{ home.profile_image.url }}" alt="Profile" style="max-width: 150px; display:block; margin-top:10px;">
                {% endif %}
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-success">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
