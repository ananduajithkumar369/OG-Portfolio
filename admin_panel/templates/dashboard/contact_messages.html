{% extends "dashboard/base.html" %}

{% block content %}
<h2>Contact Messages</h2>

<table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Subject</th>
            <th>Message</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        {% for msg in messages %}
        <tr>
            <td>{{ msg.name }}</td>
            <td>{{ msg.email }}</td>
            <td>{{ msg.subject }}</td>
            <td>{{ msg.message }}</td>
            <td>{{ msg.created_at|date:"M d, Y H:i" }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No messages yet.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
