{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Static CSS -->
    <link rel="stylesheet" href="{% static 'dashboard/css/dashboard.css' %}">

    <!-- Inline Styles (Optional, keep only if needed) -->
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f3f4f6;
        }

        /* Sidebar */
        aside {
            width: 240px;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        aside h3 {
            margin-bottom: 25px;
            font-size: 20px;
        }

        aside a,
        aside button {
            display: block;
            width: 100%;
            color: #cbd5f5;
            padding: 10px 12px;
            margin-bottom: 6px;
            text-decoration: none;
            font-size: 15px;
            border-radius: 6px;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
        }

        aside a:hover,
        aside button:hover {
            background: #1e293b;
            color: white;
        }

        aside hr {
            border: none;
            border-top: 1px solid #334155;
            margin: 15px 0;
        }

        /* Main content */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            background: white;
            padding: 16px 24px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            margin: 0;
            font-size: 18px;
            color: #111827;
        }

        header span {
            font-size: 14px;
            color: #4b5563;
        }

        main {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #111827;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            background: #f9fafb;
            transition: border 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            background: #ffffff;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background-color: #2563eb;
            color: #ffffff;
        }

        .btn-success {
            background-color: #16a34a;
            color: #ffffff;
        }

        .btn-danger {
            background-color: #dc2626;
            color: #ffffff;
        }

        .btn-info {
            background-color: #0ea5e9;
            color: #ffffff;
        }

        .btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
        }

        .cards-container {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            margin-bottom: 30px;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<script>
function confirmLogout() {
    if (confirm("Are you sure you want to logout?")) {
        document.getElementById("logout-form").submit();
    }
}
</script>


<body>

    <!-- SIDEBAR -->
    <aside>
        <h3>Dashboard</h3>

        <a href="{% url 'dashboard:dashboard_home' %}">Overview</a>

        <hr>

        <a href="{% url 'dashboard:dashboard_home_edit' %}">Home</a>
        <a href="{% url 'dashboard:academics_list' %}">Academics</a>
        <a href="{% url 'dashboard:experience_list' %}">Experience</a>
        <a href="{% url 'dashboard:project_list' %}">Projects</a>
        <a href="{% url 'dashboard:skill_list' %}">Skills</a>
        <a href="{% url 'dashboard:about_edit' %}">About</a>
        <a href="{% url 'dashboard:contact_edit' %}">Contact</a>

        <hr>

        <form id="logout-form" method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="button" onclick="confirmLogout()">Logout</button>
        </form>

    </aside>

    <!-- MAIN CONTENT -->
    <div class="content">
        <header>
            <h2>Portfolio Dashboard</h2>
            <span>Welcome, {{ request.user.username }}</span>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

</body>

</html>
